<!-- Hero -->
<section class="bg-gradient-to-br from-indigo-600 to-purple-700 text-white py-20">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
    <h1 class="text-5xl font-bold mb-4">Get In Touch</h1>
    <p class="text-xl text-indigo-100 max-w-xl mx-auto">
      Have a question or want to learn more? We'd love to hear from you.
    </p>
  </div>
</section>

<!-- Contact Form + Info -->
<section class="py-16 bg-gray-50">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">

      <!-- Contact Info -->
      <div class="space-y-6">
        <h2 class="text-2xl font-bold text-gray-900">Contact Info</h2>
        @for (info of contactInfo; track info.label) {
          <div class="flex items-start gap-4 bg-white p-5 rounded-xl shadow-sm border border-gray-100">
            <span class="text-2xl">{{ info.icon }}</span>
            <div>
              <div class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">{{ info.label }}</div>
              <div class="text-gray-800 font-medium">{{ info.value }}</div>
            </div>
          </div>
        }
      </div>

      <!-- Form -->
      <div class="lg:col-span-2 bg-white rounded-2xl shadow-sm border border-gray-100 p-8">

        @if (submitted()) {
          <div class="text-center py-12">
            <div class="text-6xl mb-4">✅</div>
            <h3 class="text-2xl font-bold text-gray-900 mb-2">Message Sent!</h3>
            <p class="text-gray-500 mb-6">Thanks {{ form.name }}, we'll get back to you soon.</p>
            <button
              (click)="reset()"
              class="px-6 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors font-medium"
            >
              Send Another
            </button>
          </div>
        } @else {
          <form (ngSubmit)="onSubmit()" #contactForm="ngForm">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-6">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                <input
                  type="text"
                  name="name"
                  [(ngModel)]="form.name"
                  required
                  placeholder="Your name"
                  class="w-full px-4 py-2.5 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                />
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input
                  type="email"
                  name="email"
                  [(ngModel)]="form.email"
                  required
                  placeholder="you@example.com"
                  class="w-full px-4 py-2.5 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                />
              </div>
            </div>
            <div class="mb-6">
              <label class="block text-sm font-medium text-gray-700 mb-1">Subject</label>
              <input
                type="text"
                name="subject"
                [(ngModel)]="form.subject"
                required
                placeholder="How can we help?"
                class="w-full px-4 py-2.5 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
              />
            </div>
            <div class="mb-6">
              <label class="block text-sm font-medium text-gray-700 mb-1">Message</label>
              <textarea
                name="message"
                [(ngModel)]="form.message"
                required
                rows="5"
                placeholder="Tell us more..."
                class="w-full px-4 py-2.5 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition resize-none"
              ></textarea>
            </div>
            <button
              type="submit"
              [disabled]="contactForm.invalid"
              class="w-full py-3 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700 disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
            >
              Send Message
            </button>
          </form>
        }
      </div>

    </div>
  </div>
</section>
